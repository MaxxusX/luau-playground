name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build
        uses: ./.github/actions/build

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          path: dist
          retention-days: 1
